# PaleoEarth Visualizer — 生产环境 Docker Compose
# 单机部署方案（ECS / VPS）
#
# 启动: docker compose -f docker-compose.prod.yml up -d
# 查看日志: docker compose -f docker-compose.prod.yml logs -f
# 停止: docker compose -f docker-compose.prod.yml down

services:
  # ─── Nginx: 反向代理 + 前端静态文件 ───
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

  # ─── FastAPI 后端 ───
  backend:
    build: ./backend
    env_file: ./backend/.env.production
    command: >
      gunicorn app.main:app
      -k uvicorn.workers.UvicornWorker
      -w 4
      --bind 0.0.0.0:8000
      --timeout 120
      --access-logfile -
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - nc_data:/data/nc-files:ro     # NC 数据（只读）
      - overlay_data:/app/app/storage  # 生成的覆盖图
    restart: unless-stopped

  # ─── 后端（开发/备用 — 单 worker reload 模式，需要时启用）───
  # backend-dev:
  #   build: ./backend
  #   env_file: ./backend/.env.production
  #   command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
  #   ports:
  #     - "8000:8000"
  #   volumes:
  #     - ./backend:/app
  #     - nc_data:/data/nc-files:ro

  # ─── PostgreSQL 15 + PostGIS ───
  postgres:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_USER: paleoearth
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
      POSTGRES_DB: paleoearth
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paleoearth -d paleoearth"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─── Redis（缓存 + 未来 Celery 消息队列）───
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  nc_data:       # NC 气候数据文件目录
  overlay_data:  # 生成的 PNG 覆盖图
  pg_data:       # PostgreSQL 数据
  redis_data:    # Redis 持久化
